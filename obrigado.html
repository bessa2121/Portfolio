<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagem enviada — Davi Tavares</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .ty-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    .ty-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2rem;
      animation: popIn 0.6s var(--spring-ease) both;
    }
    .ty-icon svg { width: 36px; height: 36px; color: #fff; }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .ty-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      color: var(--fg);
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
      animation: fadeSlideUp 0.6s 0.2s var(--ease) both;
    }
    .ty-sub {
      font-size: 1rem;
      color: var(--fg2);
      max-width: 420px;
      margin: 0 auto 2.5rem;
      animation: fadeSlideUp 0.6s 0.35s var(--ease) both;
    }
    .ty-actions {
      animation: fadeSlideUp 0.6s 0.5s var(--ease) both;
    }
  </style>
</head>
<body>
<div id="cursor-glow"></div>
<canvas id="bg-canvas"></canvas>

<header id="header">
  <a href="index.html" class="logo">
    <span class="logo-icon">DT</span>
    Davi Tavares
  </a>
  <nav>
    <a href="index.html#home">Home</a>
    <a href="index.html#projetos">Projetos</a>
    <a href="index.html#sobre">Sobre</a>
    <a href="index.html#contato">Contato</a>
  </nav>
</header>

<main class="ty-page">
  <div class="ty-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  </div>
  <h1 class="ty-title">Mensagem enviada!</h1>
  <p class="ty-sub">Obrigado pelo contato. Retorno em breve — provavelmente hoje mesmo.</p>
  <div class="ty-actions">
    <a href="index.html" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Voltar ao portfólio
    </a>
  </div>
</main>

<script src="assets/js/scripts.js"></script>
</body>
</html>
